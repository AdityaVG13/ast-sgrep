name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Build workspace
        run: cargo build --workspace
      - name: Test workspace
        run: cargo test --workspace
      - name: Bench smoke
        run: |
          cargo build --release -p ast-sgrep-cli
          ./target/release/asgrep index tests/fixtures/sample
          ./target/release/asgrep bench tests/fixtures/sample --iterations 10

  publish-dry-run:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo publish dry-run (all crates)
        run: |
          cargo publish -p ast-sgrep-lang --dry-run
          cargo publish -p ast-sgrep-embed --dry-run
          cargo publish -p ast-sgrep-core --dry-run
          cargo publish -p ast-sgrep-cli --dry-run
          cargo publish -p ast-sgrep-lsp --dry-run
