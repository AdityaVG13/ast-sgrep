<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" fill="none" role="img" aria-label="ast-sgrep - Hybrid code search that understands intent">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#0c1322"/>
      <stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="1" y="1" width="1278" height="318" rx="12" fill="url(#bg)" stroke="#21262d" stroke-width="2"/>
  <!-- Left Accent Bar -->
  <path d="M 1 13 Q 1 1 13 1 L 13 319 Q 1 319 1 307 Z" fill="#56d364" opacity="0.8"/>
  
  <!-- Typography -->
  <text x="80" y="130" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="88" fill="#56d364">ast-sgrep</text>
  
  <!-- Version Pill -->
  <g transform="translate(580, 72)">
    <rect x="0" y="0" width="124" height="36" rx="18" fill="#56d364" fill-opacity="0.1" stroke="#56d364" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="62" y="24" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-weight="600" font-size="16" fill="#56d364">1.0.0-alpha</text>
  </g>
  
  <text x="84" y="184" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="26" fill="#c9d1d9">Hybrid code search that understands intent</text>
  <text x="84" y="236" font-family="ui-monospace, SFMono-Regular, monospace" font-weight="600" font-size="22" fill="#8b949e">AST shapes  •  Text speed  •  Intent ranking</text>
  
  <!-- Motif: AST merging with Grep Scan Lines -->
  
  <!-- Grep Scan Lines (Background Context) -->
  <g stroke="#30363d" stroke-width="4" stroke-linecap="round">
    <path d="M 1020 80 L 1180 80" stroke-dasharray="20 10 40 10 15 10 30" />
    <path d="M 1020 120 L 1160 120" stroke-dasharray="30 10 20 10 40" />
    <path d="M 1020 200 L 1190 200" stroke-dasharray="25 10 35 10 20" />
    <path d="M 1020 240 L 1150 240" stroke-dasharray="40 10 10 10 20" />
  </g>

  <!-- AST Inactive Edges -->
  <g stroke="#30363d" stroke-width="2" fill="none">
    <path d="M 760 160 L 860 100" />
    <path d="M 760 160 L 860 220" />
    <path d="M 860 100 L 960 80" />
    <path d="M 860 100 L 960 120" />
    <path d="M 860 220 L 960 200" />
    <path d="M 860 220 L 960 240" />
  </g>

  <!-- Connectors from AST leaf nodes to Grep Lines -->
  <g stroke="#30363d" stroke-width="2" stroke-dasharray="4 4" opacity="0.6">
    <path d="M 960 80 L 1000 80" />
    <path d="M 960 120 L 1000 120" />
    <path d="M 960 200 L 1000 200" />
    <path d="M 960 240 L 1000 240" />
  </g>

  <!-- Active Merged Highlighted Row (Grep + AST) -->
  <!-- Highlight Background -->
  <rect x="940" y="140" width="260" height="40" rx="6" fill="#56d364" fill-opacity="0.1" stroke="#56d364" stroke-opacity="0.3" stroke-width="1.5" />
  
  <!-- Active AST Edge -->
  <g stroke="#56d364" stroke-width="3" fill="none">
    <path d="M 760 160 L 860 160" />
    <path d="M 860 160 L 960 160" />
  </g>

  <!-- Active Connector to highlighted row -->
  <path d="M 960 160 L 1000 160" stroke="#56d364" stroke-width="3" stroke-dasharray="4 4" />

  <!-- Active Scan Line (Grep) -->
  <path d="M 1020 160 L 1170 160" stroke="#56d364" stroke-width="4" stroke-linecap="round" stroke-dasharray="30 10 50 10 25" />

  <!-- Scanning Indicator on active row -->
  <line x1="1020" y1="160" x2="1050" y2="160" stroke="#c9d1d9" stroke-width="4" stroke-linecap="round" />

  <!-- AST Inactive Nodes -->
  <circle cx="860" cy="100" r="8" fill="#161b22" stroke="#30363d" stroke-width="2" />
  <circle cx="860" cy="220" r="8" fill="#161b22" stroke="#30363d" stroke-width="2" />
  <circle cx="960" cy="80" r="6" fill="#161b22" stroke="#30363d" stroke-width="2" />
  <circle cx="960" cy="120" r="6" fill="#161b22" stroke="#30363d" stroke-width="2" />
  <circle cx="960" cy="200" r="6" fill="#161b22" stroke="#30363d" stroke-width="2" />
  <circle cx="960" cy="240" r="6" fill="#161b22" stroke="#30363d" stroke-width="2" />

  <!-- AST Active Nodes -->
  <circle cx="760" cy="160" r="10" fill="#161b22" stroke="#56d364" stroke-width="3" />
  <circle cx="860" cy="160" r="10" fill="#161b22" stroke="#56d364" stroke-width="3" />
  <circle cx="960" cy="160" r="8" fill="#56d364" />

</svg>